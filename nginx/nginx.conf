events {}

http {
  # Global settings
  client_max_body_size 100M;
  send_timeout 120s;
  proxy_read_timeout 120s;
  proxy_connect_timeout 120s;
  proxy_send_timeout 120s;
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 80;

    # Reverse proxy rules under /api
    location /api/scrape {
      set $trendscraper_upstream trendscraper:3000;
      proxy_pass http://$trendscraper_upstream/scrape;
    }

    location /api/generate {
      set $trendscraper_upstream trendscraper:3000;
      proxy_pass http://$trendscraper_upstream/generate;
    }

    location /api/burn {
      set $trendscraper_upstream trendscraper:3000;
      proxy_pass http://$trendscraper_upstream/burn;
    }

    location = /api/coquiSpeakerId {
      set $trendscraper_upstream trendscraper:3000;
      proxy_pass http://$trendscraper_upstream/coquiSpeakerId;
    }
    
    location = /api/align {
      set $speechalign_upstream speechalign:5000;
      proxy_pass http://$speechalign_upstream/align;
    }

    location = /api/tts {
      set $trendscraper_upstream trendscraper:3000;
      proxy_pass http://$trendscraper_upstream/tts;
      # XTTS can take longer on CPU for long prompts/voice cloning.
      proxy_connect_timeout 86400s;
      proxy_send_timeout 86400s;
      proxy_read_timeout 86400s;
      send_timeout 86400s;
    }

    location /api/speakers {
      set $trendscraper_upstream trendscraper:3000;
      proxy_pass http://$trendscraper_upstream/speakers;
    }

    location /api/languages {
      set $trendscraper_upstream trendscraper:3000;
      proxy_pass http://$trendscraper_upstream/languages;
    }

    location /api/video-config {
      set $trendscraper_upstream trendscraper:3000;
      proxy_pass http://$trendscraper_upstream/video-config;
    }

    location /api/settings {
      set $trendscraper_upstream trendscraper:3000;
      proxy_pass http://$trendscraper_upstream/settings;
    }

    location /api/jobs/uploads {
      set $trendscraper_upstream trendscraper:3000;
      proxy_pass http://$trendscraper_upstream/jobs/uploads;
    }

    # Catch-all for any other /api/* routes
    location ~ ^/api/(.*)$ {
      set $trendscraper_upstream trendscraper:3000;
      proxy_pass http://$trendscraper_upstream/$1;
    }

    # Serve static files from nginx/html/
    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ =404;
    }
  }
}
