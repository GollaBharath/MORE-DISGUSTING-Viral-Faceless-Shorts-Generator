services:
  trendscraper:
    build:
      context: ./trendscraper
    environment:
      - GEMINI_API_KEY
      - OPENROUTER_API_KEY
      - OPENROUTER_MODEL
      - LOCALE
      - COQUI_SPEAKER_ID
      - COQUI_LANGUAGE_ID
      - TTS_UPSTREAM_TIMEOUT_MS
      - DEFAULT_VIDEO_ORIENTATION
      - DEFAULT_VIDEO_WIDTH
      - DEFAULT_VIDEO_HEIGHT
    volumes:
      - ./videos:/mnt/videos
  coqui:
    build:
      context: ./coqui
    environment:
      - COQUI_TOS_AGREED=1
    volumes:
      - coqui_models:/root/.local/share/tts
  speechalign:
    build:
      context: ./speechalign
  nginx:
    image: nginx:latest
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - trendscraper
      - coqui
      - speechalign

volumes:
  coqui_models:
